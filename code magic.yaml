workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack and debug
        script: |
          tar -xf FocusFilter_v4.tar.gz-5
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Looking for project folders ==="
          find . -type d -name "*app*" -o -name "*build.gradle*" | head -20
      - name: Generate Gradle Wrapper
        script: |
          # Try to find the right folder
          if [ -d "FocusFilter" ]; then
            cd FocusFilter
          elif [ -d "app" ]; then
            echo "Already in project root"
          else
            cd $(find . -type d -name "app" | head -1 | xargs dirname)
          fi
          gradle wrapper
          chmod +x gradlew
      - name: Build APK
        script: |
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
