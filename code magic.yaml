workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_v4.tar.gz-5
          ls -la
      - name: Generate Gradle Wrapper
        script: |
          # Find the project root (where build.gradle is)
          ROOT=$(find . -name "build.gradle" -not -path "*/\.*" | head -1 | xargs dirname)
          echo "Project root: $ROOT"
          cd $ROOT
          gradle wrapper
          chmod +x gradlew
          ls -la gradlew
      - name: Build APK
        script: |
          # Go back to the project root
          ROOT=$(find . -name "build.gradle" -not -path "*/\.*" | head -1 | xargs dirname)
          cd $ROOT
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - FocusFilter/app/build/outputs/apk/debug/*.apk
