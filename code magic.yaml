workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper
          chmod +x gradlew
      - name: Build APK
        script: |
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
