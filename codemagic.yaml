workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack and build
        script: |
          echo "=== Files before unpack ==="
          ls -la
          tar -xf FocusFilter_v4.tar.gz-5.tar
          echo "=== After unpack ==="
          ls -la
          echo "=== Finding project root ==="
          find . -name "build.gradle" -type f
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - FocusFilter/app/build/outputs/apk/debug/*.apk
