workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_v4.tar.gz-5.tar
      - name: Generate Gradle wrapper
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
      - name: Clean and build with info
        script: |
          cd FocusFilter
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info
    artifacts:
      - FocusFilter/app/build/outputs/apk/debug/*.apk
