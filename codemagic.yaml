workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_v4.tar.gz-5.tar
          ls -la   # show what we have
      - name: Generate Gradle wrapper
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
          ls -la gradlew   # verify it exists
      - name: Build APK
        script: |
          cd FocusFilter
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - FocusFilter/app/build/outputs/apk/debug/*.apk
