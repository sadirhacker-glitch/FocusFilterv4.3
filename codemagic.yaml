workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Use specific Gradle version
        script: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          export PATH=$PWD/gradle-8.7/bin:$PATH
          gradle --version
      - name: Unpack and build with full logging
        script: |
          tar -xf FocusFilter_v4.tar.gz-5.tar
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info
    artifacts:
      - FocusFilter/app/build/outputs/apk/debug/*.apk
