workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_v4.tar.gz-5.tar
      - name: Generate Gradle wrapper
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
      - name: Build with full log
        script: |
          cd FocusFilter
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info > build_log.txt 2>&1
          cat build_log.txt
    artifacts:
      - FocusFilter/build_log.txt
      - FocusFilter/app/build/outputs/apk/debug/*.apk
