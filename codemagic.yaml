workflows:
  android-build:
    name: Debug Resources
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_v4.tar.gz-5.tar
      - name: Generate wrapper
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
      - name: Process resources only (no full build)
        script: |
          cd FocusFilter
          ./gradlew processDebugResources --stacktrace --info
    artifacts:
      - debug.txt
